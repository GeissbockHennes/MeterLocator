<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeterLocator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }
        .btn {
            display: inline-block;
            width: 100%;
            max-width: 300px;
            margin: 10px 0;
            padding: 20px;
            font-size: 18px;
            text-align: center;
            border: none;
            border-radius: 8px;
            background-color: #0078d4;
            color: white;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #005fa3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MeterLocator</h1>
        <button onclick="window.location.href='location_create.html'" class="btn">Koordinaten ermitteln</button>
        <button onclick="window.location.href='location_find.html'" class="btn">Koordinaten auf Karte anzeigen</button>
    </div>
</body>
</html>
